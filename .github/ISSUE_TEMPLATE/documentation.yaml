name: 📚 문서 개선
description: 문서 개선 요청입니다.
title: '[DOCS] '
labels: ['documentation']
body:
  - type: dropdown
    id: target
    attributes:
      label: "📖 개선 대상"
      options:
        - "README.md"
        - "API 문서"
        - "코드 주석"
        - "튜토리얼"
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: "💡 개선 제안"
      placeholder: "어떻게 개선할까요?"
    validations:
      required: true
